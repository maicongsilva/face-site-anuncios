<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FaceLoginSiteanuncios</title>
  <script>
    // GitHub Pages SPA redirect: store the current path in sessionStorage
    // then redirect to the base URL so Angular can take over
    var path = window.location.pathname;
    var base = '/face-site-anuncios';
    if (path !== base && path !== base + '/') {
      sessionStorage.setItem('redirect', path);
    }
    window.location.replace(base + '/');
  </script>
</head>
<body></body>
</html>
