<div class="auth-page">
  <div class="auth-shell">
    <div class="auth-highlight">
      <span class="auth-pill">Login seguro</span>
      <h1>Entre na sua conta</h1>
      <p>Gerencie seus dados, acompanhe seu perfil e acesse a plataforma com autenticação JWT.</p>
      <ul class="feature-list">
        <li>Token salvo automaticamente</li>
        <li>Rotas protegidas no frontend</li>
        <li>Integração real com o backend</li>
      </ul>
    </div>

    <div class="auth-card">
      <div class="card-body">
        <h5 class="card-title">Acesse a sua conta</h5>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" name="email" #email required>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" name="password" #password required>
        </div>

        <div class="form-group mt-3">
          <button id="button" type="submit" class="btn btn-primary btn-block" [disabled]="loading" (click)="trylogin(email.value, password.value)">
            <span *ngIf="loading" class="btn-spinner"></span>
            {{ loading ? 'Entrando...' : 'Entrar' }}
          </button>
          <div class="status-message text-center mt-2" [class.error-msg]="message && !message.includes('sucesso')">{{ message }}</div>
        </div>

        <p class="mt-3">Não é um usuário? <a [routerLink]="['/register']">Cadastre-se</a></p>
      </div>
    </div>
  </div>
</div>
